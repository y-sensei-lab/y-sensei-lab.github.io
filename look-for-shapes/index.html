<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>図形探しカメラ</title>
    <style>
        /* === ベーススタイル === */
        * {
            box-sizing: border-box;
            user-select: none; /* テキスト選択を防ぐ */
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', 'Arial Rounded MT Bold', sans-serif;
        }

        /* === カメラ映像と透かし === */
        #camera, #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        #camera {
            object-fit: cover; /* 画面いっぱいに広げる */
            z-index: 1;
            /* インカメラ時はJSで transform: scaleX(-1); を付与して鏡像にする */
        }
        #overlay {
            z-index: 2;
            pointer-events: auto; /* お絵かきのためにタッチイベントを有効化 */
            touch-action: none; /* なぞっている時に画面がスクロールしないようにする */
        }

        /* === UIコンテナ === */
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none; /* UIの隙間から画面(Canvas)をタッチできるように */
            display: flex;
            flex-direction: row;
            justify-content: flex-end; /* 右側(シャッターなど)だけflexで配置 */
            align-items: center; /* 縦方向の中央に配置 */
            padding: 30px 40px;
        }
        /* ボタンなど操作要素のみタッチイベントを有効化 */
        #ui-container > * {
            pointer-events: auto;
        }

        /* === 左上のコントロール群（かきなおす ＆ 半月スライダー） === */
        #top-left-controls {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column; /* 縦並びに変更 */
            align-items: flex-start; /* 左寄せに配置 */
            gap: 15px; /* ボタンとスライダーの隙間 */
            z-index: 20;
            pointer-events: none; /* コンテナ自体はタッチをスルー */
        }
        #top-left-controls > * {
            pointer-events: auto; /* 中身の要素はタッチ有効 */
        }

        /* === 上部ボタンの共通スタイル === */
        .top-btn {
            background-color: rgba(255, 255, 255, 0.7); /* 少し透明度を上げて控えめに */
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 16px;
            font-weight: bold;
            color: #555;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .top-btn:active {
            transform: scale(0.95);
            background-color: #e0e0e0;
        }
        .action-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
            display: block;
        }
        
        /* カメラきりかえボタン（右上） */
        #switch-camera-btn { 
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;
            z-index: 20;
        }

        /* === 右側：コントロール領域 === */
        #right-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* === ズームスライダーコンテナ === */
        #zoom-container {
            display: none;
            align-items: center;
            gap: 10px;
            background-color: rgba(0, 0, 0, 0.4);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }
        .slider-label { color: white; font-size: 20px; }
        
        /* === 透明度(半月)スライダーコンテナ（左上に配置） === */
        #alpha-container {
            display: flex;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.7); /* 隣のボタンとデザインを合わせる */
            padding: 10px 15px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
        }

        /* === スライダーの基本設定 === */
        .custom-slider {
            -webkit-appearance: none;
            width: 100px; height: 6px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 3px; outline: none;
        }
        #alpha-slider {
            background: rgba(0, 0, 0, 0.2); /* 明るい背景で見やすいように暗めのレールにする */
        }

        /* 普通のズームスライダーのつまみ */
        #zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px; height: 28px;
            background: white; border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            cursor: pointer;
        }

        /* 透明度(半月)スライダーのつまみ */
        #alpha-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px; height: 28px;
            border-radius: 50%;
            /* CSSグラデーションで「半月」を表現（左が白、右がダークグレー） */
            background: linear-gradient(to right, white 50%, #444 50%);
            border: 2px solid white; /* 半月をくっきりさせるためのフチドリ */
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            cursor: pointer;
        }

        /* === シャッターボタン === */
        #shutter-btn {
            width: 90px; height: 90px;
            border-radius: 50%;
            background-color: white;
            border: 6px solid #e0e0e0;
            box-shadow: 0 0 0 6px white, 0 6px 15px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.1s;
            position: relative;
            margin-top: 10px; /* スライダーとの距離を少し取る */
        }
        #shutter-btn:active {
            transform: scale(0.9);
            background-color: #f5f5f5;
        }
        #shutter-btn::after {
            content: 'とる';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px; font-weight: bold; color: #666;
        }

        /* === 撮影フラッシュエフェクト === */
        #flash {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: white;
            z-index: 100; opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-out;
        }
        #flash.active { opacity: 1; transition: none; }

        /* === プレビューモーダル（保存用） === */
        #preview-modal {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 300; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }
        #preview-modal.active { display: flex; }
        #preview-image {
            max-width: 90%; max-height: 70vh;
            border: 4px solid white; border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .instruction-text {
            color: white; font-size: 20px; font-weight: bold;
            margin-top: 20px; text-align: center; line-height: 1.4;
        }
        #close-preview-btn {
            margin-top: 20px; padding: 10px 30px;
            font-size: 18px; font-weight: bold;
            background-color: #f44336; color: white;
            border: none; border-radius: 20px; cursor: pointer;
        }

        /* エラーメッセージ用 */
        #error-message {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 20px; border-radius: 10px;
            text-align: center; z-index: 200; display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- カメラ映像 -->
    <video id="camera" autoplay playsinline muted></video>
    
    <!-- 透かし・お絵かき用Canvas -->
    <canvas id="overlay"></canvas>

    <!-- UI -->
    <div id="ui-container">
        
        <!-- 左上：かきなおす ＆ 透明度スライダー -->
        <div id="top-left-controls">
            <!-- やりなおしボタン -->
            <button id="reset-shape-btn" class="top-btn">
                <svg class="action-icon" viewBox="0 0 24 24">
                    <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
                かきなおす
            </button>

            <!-- 透明度スライダー（つまみが半月） -->
            <div id="alpha-container">
                <input type="range" id="alpha-slider" class="custom-slider" min="0" max="1" step="0.1" value="0.5">
            </div>
        </div>

        <!-- カメラ切り替えボタン（右上） -->
        <button id="switch-camera-btn" class="top-btn">
            <svg class="action-icon" viewBox="0 0 24 24">
                <!-- カメラをぐるっと回すようなアイコン -->
                <path d="M20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 11.5V13H9v2.5L5.5 12 9 8.5V11h6V8.5l3.5 3.5-3.5 3.5z"/>
            </svg>
            カメラ
        </button>

        <!-- 右側：ズームとシャッター -->
        <div id="right-controls">
            <!-- ズームスライダー -->
            <div id="zoom-container">
                <span class="slider-label">🔍</span>
                <input type="range" id="zoom-slider" class="custom-slider" min="1" max="3" step="0.1" value="1">
            </div>

            <!-- シャッター -->
            <button id="shutter-btn"></button>
        </div>
    </div>

    <!-- フラッシュ -->
    <div id="flash"></div>

    <!-- プレビューモーダル -->
    <div id="preview-modal">
        <img id="preview-image" src="" alt="撮影した写真">
        <div class="instruction-text">
            しゃしんを ながおし して<br>「写真に追加」をえらんでね！
        </div>
        <button id="close-preview-btn">もどる</button>
    </div>

    <!-- エラー表示用 -->
    <div id="error-message"></div>

    <script>
        const video = document.getElementById('camera');
        const overlayCanvas = document.getElementById('overlay');
        const ctx = overlayCanvas.getContext('2d');
        const resetBtn = document.getElementById('reset-shape-btn');
        const switchCameraBtn = document.getElementById('switch-camera-btn');
        const shutterBtn = document.getElementById('shutter-btn');
        const zoomContainer = document.getElementById('zoom-container');
        const zoomSlider = document.getElementById('zoom-slider');
        const alphaSlider = document.getElementById('alpha-slider');
        const flash = document.getElementById('flash');
        const errorMsg = document.getElementById('error-message');
        const previewModal = document.getElementById('preview-modal');
        const previewImage = document.getElementById('preview-image');
        const closePreviewBtn = document.getElementById('close-preview-btn');

        let mediaStreamTrack = null;
        let currentStream = null;
        const DPR = window.devicePixelRatio || 1;

        // アプリの状態管理
        let isDrawing = false;
        let points = []; 
        let currentFacingMode = 'environment'; // 初期は背面カメラ
        let overlayAlpha = 0.5; // 背景の初期透明度

        // ==========================================
        // 1. お絵かき・透かしの描画処理
        // ==========================================
        
        function drawOverlay() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            overlayCanvas.width = w * DPR;
            overlayCanvas.height = h * DPR;
            ctx.scale(DPR, DPR);

            // 背景を現在の透明度(overlayAlpha)で塗りつぶす
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = `rgba(0, 0, 0, ${overlayAlpha})`;
            ctx.fillRect(0, 0, w, h);

            if (points.length > 2) {
                // 描かれた形がある場合、透明にくり抜く
                ctx.globalCompositeOperation = 'destination-out';
                ctx.fillStyle = '#fff';
                
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                ctx.closePath();
                ctx.fill();

                // くり抜いた枠に白い破線を描く
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = `rgba(255, 255, 255, ${Math.max(0.3, overlayAlpha + 0.2)})`; // 背景が薄い時は線も少し薄く
                ctx.lineWidth = 4;
                ctx.setLineDash([12, 12]);
                ctx.stroke();
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = 'white';
                ctx.font = "bold 28px 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', 'Arial Rounded MT Bold', sans-serif";
                ctx.textAlign = 'center';
                
                // 背景が完全に透明(0)に近い場合は、文字が見えやすいように影をつける
                if (overlayAlpha < 0.3) {
                    ctx.shadowColor = "black";
                    ctx.shadowBlur = 4;
                    ctx.shadowOffsetX = 2;
                    ctx.shadowOffsetY = 2;
                }
                ctx.fillText('がめん を なぞって', w / 2, h / 2 - 20);
                ctx.fillText('かたち を つくろう！', w / 2, h / 2 + 25);
                ctx.shadowColor = "transparent"; // 影をリセット
            }
        }

        // なぞっている最中の状態
        function drawDrawingState() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            overlayCanvas.width = w * DPR;
            overlayCanvas.height = h * DPR;
            ctx.scale(DPR, DPR);

            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = `rgba(0, 0, 0, ${overlayAlpha})`;
            ctx.fillRect(0, 0, w, h);

            if (points.length > 0) {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.setLineDash([]);

                // 背景が明るい場合は線が見えやすいように影をつける
                if (overlayAlpha < 0.3) {
                    ctx.shadowColor = "black";
                    ctx.shadowBlur = 4;
                }

                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                ctx.stroke();
                ctx.shadowColor = "transparent";
            }
        }

        // 透明度スライダーの操作
        alphaSlider.addEventListener('input', (e) => {
            overlayAlpha = parseFloat(e.target.value);
            if (isDrawing) {
                drawDrawingState();
            } else {
                drawOverlay();
            }
        });

        // ==========================================
        // 2. タッチイベント
        // ==========================================
        overlayCanvas.addEventListener('pointerdown', (e) => {
            isDrawing = true;
            points = [{ x: e.clientX, y: e.clientY }];
            drawDrawingState();
        });
        overlayCanvas.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            points.push({ x: e.clientX, y: e.clientY });
            drawDrawingState();
        });
        overlayCanvas.addEventListener('pointerup', () => {
            if (!isDrawing) return;
            isDrawing = false;
            drawOverlay();
        });
        overlayCanvas.addEventListener('pointercancel', () => {
            if (!isDrawing) return;
            isDrawing = false;
            drawOverlay();
        });

        resetBtn.addEventListener('click', () => {
            points = [];
            drawOverlay();
        });

        window.addEventListener('resize', drawOverlay);

        // ==========================================
        // 3. カメラ起動と切り替え
        // ==========================================
        async function startCamera(facingMode) {
            // 既にカメラが動いていれば止める
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                video.srcObject = stream;
                currentStream = stream;
                
                // インカメラの場合は鏡像表示にする
                if (facingMode === 'user') {
                    video.style.transform = 'scaleX(-1)';
                } else {
                    video.style.transform = 'none';
                }
                
                mediaStreamTrack = stream.getVideoTracks()[0];
                const capabilities = mediaStreamTrack.getCapabilities();
                const settings = mediaStreamTrack.getSettings();

                // ズーム機能の表示切り替え（インカメラ等非対応時は隠す）
                if (capabilities.zoom) {
                    zoomSlider.min = capabilities.zoom.min;
                    zoomSlider.max = capabilities.zoom.max;
                    zoomSlider.step = capabilities.zoom.step;
                    zoomSlider.value = settings.zoom || capabilities.zoom.min;
                    zoomContainer.style.display = 'flex';
                } else {
                    zoomContainer.style.display = 'none';
                }
            } catch (err) {
                console.error("Camera access error:", err);
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = "カメラを起動できませんでした。<br>設定からカメラのアクセスを許可してください。";
            }
        }

        // カメラ切り替えボタンのイベント
        switchCameraBtn.addEventListener('click', () => {
            currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
            startCamera(currentFacingMode);
        });

        zoomSlider.addEventListener('input', (e) => {
            if (mediaStreamTrack) {
                mediaStreamTrack.applyConstraints({
                    advanced: [{ zoom: parseFloat(e.target.value) }]
                }).catch(err => console.error("Zoom not supported", err));
            }
        });

        // ==========================================
        // 4. 撮影処理
        // ==========================================
        function takePhoto() {
            flash.classList.add('active');
            setTimeout(() => flash.classList.remove('active'), 50);

            const captureCanvas = document.createElement('canvas');
            const capCtx = captureCanvas.getContext('2d');
            
            const w = window.innerWidth * DPR;
            const h = window.innerHeight * DPR;
            captureCanvas.width = w;
            captureCanvas.height = h;

            const vw = video.videoWidth;
            const vh = video.videoHeight;
            const vRatio = vw / vh;
            const cRatio = w / h;

            let drawWidth, drawHeight, startX, startY;
            if (cRatio > vRatio) {
                drawWidth = w; drawHeight = w / vRatio;
                startX = 0; startY = (h - drawHeight) / 2;
            } else {
                drawWidth = h * vRatio; drawHeight = h;
                startX = (w - drawWidth) / 2; startY = 0;
            }

            // インカメラの時は、保存される画像も鏡像になるようにCanvasを反転して描画
            if (currentFacingMode === 'user') {
                capCtx.save();
                capCtx.translate(w, 0); // 右端を基準に
                capCtx.scale(-1, 1);    // 左右反転
                capCtx.drawImage(video, 0, 0, vw, vh, startX, startY, drawWidth, drawHeight);
                capCtx.restore();       // 反転を戻す
            } else {
                capCtx.drawImage(video, 0, 0, vw, vh, startX, startY, drawWidth, drawHeight);
            }

            // 透かしを重ねる
            capCtx.drawImage(overlayCanvas, 0, 0, w, h);

            const dataUrl = captureCanvas.toDataURL('image/png');
            previewImage.src = dataUrl;
            previewModal.classList.add('active');
        }

        shutterBtn.addEventListener('click', takePhoto);

        closePreviewBtn.addEventListener('click', () => {
            previewModal.classList.remove('active');
            previewImage.src = '';
        });

        // 起動
        drawOverlay();
        startCamera(currentFacingMode);
    </script>
</body>
</html>
