<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>図形探しカメラ</title>
    <style>
        /* === ベーススタイル === */
        * {
            box-sizing: border-box;
            user-select: none; /* テキスト選択を防ぐ */
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', 'Arial Rounded MT Bold', sans-serif;
        }

        /* === カメラ映像と透かし === */
        #camera, #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        #camera {
            object-fit: cover; /* 画面いっぱいに広げる */
            z-index: 1;
        }
        #overlay {
            z-index: 2;
            pointer-events: none; /* 透かしCanvasはタッチイベントを無視する */
        }

        /* === UIコンテナ === */
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none; /* UIの隙間から画面タッチができるように */
            display: flex;
            flex-direction: row; /* 左と右に分ける */
            justify-content: space-between;
            align-items: center; /* 縦方向の中央に配置 */
            padding: 30px 40px;
        }
        /* ボタンなど操作要素のみタッチイベントを有効化 */
        #ui-container > * {
            pointer-events: auto;
        }

        /* === 左側：図形選択ボタン === */
        #shape-selectors {
            display: flex;
            flex-direction: column; /* 縦に並べる */
            gap: 20px;
        }
        .shape-btn {
            background-color: rgba(255, 255, 255, 0.85);
            border: 3px solid transparent;
            border-radius: 16px;
            padding: 12px 20px;
            font-size: 22px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
            min-width: 150px; /* ボタンの幅を揃える */
        }
        .shape-btn.active {
            background-color: #ffeb3b; /* 選択中は黄色で目立たせる */
            border-color: #fbc02d;
            transform: scale(1.05);
        }
        /* 中空の図形アイコン（SVG） */
        .shape-icon {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #333;
            stroke-width: 2.5;
            display: block;
        }

        /* === 右側：コントロール領域 === */
        #right-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* === ズームスライダー === */
        #zoom-container {
            display: none; /* 初期は非表示、カメラが対応していれば表示 */
            align-items: center;
            gap: 10px;
            background-color: rgba(0, 0, 0, 0.4);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }
        .zoom-label {
            color: white;
            font-size: 20px;
        }
        #zoom-slider {
            -webkit-appearance: none;
            width: 120px;
            height: 6px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 3px;
            outline: none;
        }
        #zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            cursor: pointer;
        }

        /* === シャッターボタン === */
        #shutter-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-color: white;
            border: 6px solid #e0e0e0;
            box-shadow: 0 0 0 6px white, 0 6px 15px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.1s;
            position: relative;
        }
        #shutter-btn:active {
            transform: scale(0.9);
            background-color: #f5f5f5;
        }
        #shutter-btn::after {
            content: 'とる';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            font-weight: bold;
            color: #666;
        }

        /* === 撮影フラッシュエフェクト === */
        #flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: white;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-out;
        }
        #flash.active {
            opacity: 1;
            transition: none;
        }

        /* エラーメッセージ用 */
        #error-message {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            z-index: 200;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- カメラ映像（インライン再生必須） -->
    <video id="camera" autoplay playsinline muted></video>
    
    <!-- 透かしを描画するCanvas -->
    <canvas id="overlay"></canvas>

    <!-- UI -->
    <div id="ui-container">
        
        <!-- 左側：図形切り替え -->
        <div id="shape-selectors">
            <button class="shape-btn active" data-shape="circle">
                <!-- SVGによる中空の「まる」 -->
                <svg class="shape-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>
                まる
            </button>
            <button class="shape-btn" data-shape="square">
                <!-- SVGによる中空の「しかく」 -->
                <svg class="shape-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/></svg>
                しかく
            </button>
            <button class="shape-btn" data-shape="triangle">
                <!-- SVGによる中空の「さんかく」 -->
                <svg class="shape-icon" viewBox="0 0 24 24"><polygon points="12,3 3,20 21,20" stroke-linejoin="round"/></svg>
                さんかく
            </button>
        </div>

        <!-- 右側：ズームとシャッター -->
        <div id="right-controls">
            <div id="zoom-container">
                <span class="zoom-label">🔍</span>
                <input type="range" id="zoom-slider" min="1" max="3" step="0.1" value="1">
            </div>
            
            <button id="shutter-btn"></button>
        </div>

    </div>

    <!-- 撮影時のフラッシュ演出 -->
    <div id="flash"></div>

    <!-- エラー表示用 -->
    <div id="error-message"></div>

    <script>
        const video = document.getElementById('camera');
        const overlayCanvas = document.getElementById('overlay');
        const ctx = overlayCanvas.getContext('2d');
        const shapeBtns = document.querySelectorAll('.shape-btn');
        const shutterBtn = document.getElementById('shutter-btn');
        const zoomContainer = document.getElementById('zoom-container');
        const zoomSlider = document.getElementById('zoom-slider');
        const flash = document.getElementById('flash');
        const errorMsg = document.getElementById('error-message');

        let currentShape = 'circle';
        let mediaStreamTrack = null;
        
        // 高解像度ディスプレイ（Retina等）でも綺麗に描画・保存するための倍率
        const DPR = window.devicePixelRatio || 1;

        // ==========================================
        // 1. 透かし（オーバーレイ）の描画処理
        // ==========================================
        function drawOverlay() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            // Canvasの実サイズを高解像度に合わせて設定
            overlayCanvas.width = w * DPR;
            overlayCanvas.height = h * DPR;
            
            // 以降の描画座標をCSSピクセル基準に合わせる
            ctx.scale(DPR, DPR);

            // 1. 画面全体を黒半透明(50%)で塗りつぶす
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, w, h);

            // 2. 図形部分を「透明にくり抜く」設定にする
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = '#fff';
            
            // 画面の中央座標と、基準となるサイズ（画面の短辺）を計算
            const cx = w / 2;
            const cy = h / 2;
            const minSize = Math.min(w, h);
            
            ctx.beginPath();
            if (currentShape === 'circle') {
                const radius = minSize * 0.35; // 半径
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            } else if (currentShape === 'square') {
                const size = minSize * 0.6; // 一辺の長さ
                ctx.rect(cx - size / 2, cy - size / 2, size, size);
            } else if (currentShape === 'triangle') {
                const height = minSize * 0.65; // 高さを丸と四角の間に設定
                const size = height * 2 / Math.sqrt(3); // 正三角形の底辺の長さ
                // バウンディングボックス（図形全体を囲む四角）の中心を画面中央に配置
                ctx.moveTo(cx, cy - height / 2); // 上の頂点
                ctx.lineTo(cx + size / 2, cy + height / 2); // 右下の頂点
                ctx.lineTo(cx - size / 2, cy + height / 2); // 左下の頂点
                ctx.closePath();
            }
            ctx.fill();

            // 3. 描画モードを元に戻し、くり抜いた枠に白い破線を描いてわかりやすくする
            ctx.globalCompositeOperation = 'source-over';
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 4;
            ctx.setLineDash([12, 12]);
            ctx.stroke();
        }

        // 図形ボタンの切り替えイベント
        shapeBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                shapeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentShape = btn.dataset.shape;
                drawOverlay();
            });
        });

        // 画面リサイズ・回転時に再描画
        window.addEventListener('resize', drawOverlay);

        // ==========================================
        // 2. カメラの起動とズーム制御
        // ==========================================
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment', // 背面カメラ
                        width: { ideal: 1920 },    // 高画質を要求
                        height: { ideal: 1080 }
                    },
                    audio: false
                });
                
                video.srcObject = stream;
                
                // カメラの設定を取得してズーム可能か判定
                mediaStreamTrack = stream.getVideoTracks()[0];
                const capabilities = mediaStreamTrack.getCapabilities();
                const settings = mediaStreamTrack.getSettings();

                // ズーム機能に対応している場合のみスライダーを表示
                if (capabilities.zoom) {
                    zoomSlider.min = capabilities.zoom.min;
                    zoomSlider.max = capabilities.zoom.max;
                    zoomSlider.step = capabilities.zoom.step;
                    zoomSlider.value = settings.zoom || capabilities.zoom.min;
                    zoomContainer.style.display = 'flex';
                }

            } catch (err) {
                console.error("Camera access error:", err);
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = "カメラを起動できませんでした。<br>設定からカメラのアクセスを許可してください。";
            }
        }

        // ズームスライダーのイベント
        zoomSlider.addEventListener('input', (e) => {
            if (mediaStreamTrack) {
                mediaStreamTrack.applyConstraints({
                    advanced: [{ zoom: parseFloat(e.target.value) }]
                }).catch(err => console.error("Zoom is not supported", err));
            }
        });

        // ==========================================
        // 3. 撮影と画像の保存 (合成処理)
        // ==========================================
        function takePhoto() {
            // シャッターエフェクト
            flash.classList.add('active');
            setTimeout(() => flash.classList.remove('active'), 50);

            // 撮影・合成用の一時的なCanvasを作成（高解像度）
            const captureCanvas = document.createElement('canvas');
            const capCtx = captureCanvas.getContext('2d');
            
            const w = window.innerWidth * DPR;
            const h = window.innerHeight * DPR;
            captureCanvas.width = w;
            captureCanvas.height = h;

            // ① カメラ映像の描画
            // CSSの object-fit: cover をCanvas上で再現し、画面で見えている通りに切り取る
            const vw = video.videoWidth;
            const vh = video.videoHeight;
            const vRatio = vw / vh;
            const cRatio = w / h;

            let drawWidth, drawHeight, startX, startY;

            if (cRatio > vRatio) {
                drawWidth = w;
                drawHeight = w / vRatio;
                startX = 0;
                startY = (h - drawHeight) / 2;
            } else {
                drawWidth = h * vRatio;
                drawHeight = h;
                startX = (w - drawWidth) / 2;
                startY = 0;
            }

            // カメラ映像を描画
            capCtx.drawImage(video, 0, 0, vw, vh, startX, startY, drawWidth, drawHeight);

            // ② 透かし（黒背景＋切り抜き図形）を重ねて描画
            capCtx.drawImage(overlayCanvas, 0, 0, w, h);

            // ③ 画像として端末にダウンロード
            const dataUrl = captureCanvas.toDataURL('image/png');
            const a = document.createElement('a');
            a.href = dataUrl;
            
            // ファイル名： 探しもの_図形_日時.png
            const shapeName = currentShape === 'circle' ? 'まる' : currentShape === 'square' ? 'しかく' : 'さんかく';
            const dateStr = new Date().toISOString().replace(/[:.]/g, '-');
            a.download = `さがしもの_${shapeName}_${dateStr}.png`;
            
            // ダウンロード実行
            a.click();
        }

        shutterBtn.addEventListener('click', takePhoto);

        // ==========================================
        // 起動処理
        // ==========================================
        // 初期描画
        drawOverlay();
        // カメラ起動
        startCamera();

    </script>
</body>
</html>
